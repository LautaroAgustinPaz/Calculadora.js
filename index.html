<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="./css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>
<body>
    <div class="contenedor-calculadora">
        <div id="pantalla" class="pantalla">0</div>
        <button id="c" class="btns op" type="button">C</button>
        <button id="borrar" class="btns op" type="button">←</button>
        <button class="btns op" type="button">/</button>
        <button class="btns op" type="button">*</button>
        <button class="btns" type="button">7</button>
        <button class="btns" type="button">8</button>
        <button class="btns" type="button">9</button>
        <button class="btns op" type="button">-</button>
        <button class="btns" type="button">4</button>
        <button class="btns" type="button">5</button>
        <button class="btns" type="button">6</button>
        <button class="btns op" type="button">+</button>
        <button class="btns" type="button">1</button>
        <button class="btns" type="button">2</button>
        <button class="btns" type="button">3</button>
        <button id="resultado" class="btns" type="button">=</button>
        <button id="cero" class="btns" type="button">0</button>
        <button class="btns" type="button">.</button>
    </div>
    
    <script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
    <script src="https://unpkg.com/vanta@latest/dist/vanta.waves.min.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", function () {
            VANTA.WAVES({
                el: document.body,
                mouseControls: true,
                touchControls: true,
                color: 0x0C5149
            });
        });
    </script>
    <script src="./js/main.js"></script>
</body>
</html>
